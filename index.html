<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoboTurn</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;min-height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;align-items:center;justify-content:center;padding:12px}
.screen{display:none;width:100%;max-width:500px;margin:auto}
.screen.active{display:block}
.card{background:#fff;border-radius:20px;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
h1{text-align:center;font-size:26px;font-weight:900;color:#5a2d91;margin-bottom:4px;letter-spacing:1px}
.subtitle{text-align:center;font-size:13px;color:#888;margin-bottom:20px}
.section-label{font-size:12px;font-weight:700;color:#888;letter-spacing:2px;margin-bottom:8px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.btn{flex:1;min-width:70px;padding:10px 8px;border:2px solid #ddd;border-radius:12px;background:#f8f8f8;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;color:#555;text-align:center}
.btn:hover{border-color:#a78bfa;background:#ede9fe;color:#5a2d91}
.btn.selected{border-color:#7c3aed;background:#7c3aed;color:#fff}
.btn-start{width:100%;padding:14px;background:linear-gradient(90deg,#7c3aed,#a78bfa);color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:900;cursor:pointer;margin-top:8px;letter-spacing:1px;transition:opacity .15s}
.btn-start:hover{opacity:.88}
.mode-desc{font-size:11px;color:#a78bfa;margin-bottom:12px;padding:8px 10px;background:#f5f0ff;border-radius:10px;line-height:1.7}
.word-count{font-size:12px;color:#a78bfa;text-align:right;margin-bottom:4px}
.progress-bar{height:8px;background:#ede9fe;border-radius:99px;margin-bottom:12px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#a78bfa);border-radius:99px;transition:width .3s}
.question-type{font-size:12px;color:#a78bfa;font-weight:700;margin-bottom:6px}
.question-text{font-size:36px;font-weight:900;color:#2d1b69;text-align:center;min-height:56px;margin:10px 0 18px;letter-spacing:4px;word-break:break-all}
.grid3x3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.cell{aspect-ratio:1;background:#f3f0ff;border:2px solid #c4b5fd;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#5a2d91;cursor:pointer;transition:all .15s;user-select:none;padding:4px;text-align:center;line-height:1.1}
.cell:hover{background:#ede9fe;border-color:#7c3aed;transform:scale(1.05)}
.cell.selected{background:#7c3aed;color:#fff;border-color:#5b21b6}
.cell.correct{background:#10b981;color:#fff;border-color:#059669}
.cell.wrong{background:#ef4444;color:#fff;border-color:#dc2626;animation:shake .3s}
.cell.disabled{opacity:.5;pointer-events:none}
.input-area{display:flex;gap:8px;margin-bottom:12px}
.input-area input{flex:1;padding:12px 16px;border:2px solid #c4b5fd;border-radius:12px;font-size:18px;font-weight:700;color:#2d1b69;outline:none}
.input-area input:focus{border-color:#7c3aed}
.input-area button{padding:12px 18px;background:#7c3aed;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.feedback{text-align:center;min-height:36px;font-size:20px;font-weight:900;margin-bottom:8px}
.feedback.correct{color:#10b981}
.feedback.wrong{color:#ef4444}
.score-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:14px;font-weight:700;color:#5a2d91}
.timer{font-size:22px;font-weight:900;color:#ef4444}
.timer.warn{animation:blink .5s infinite}
.timer-bar-wrap{height:6px;background:#fde8e8;border-radius:99px;margin-bottom:10px;overflow:hidden}
.timer-bar{height:100%;background:#ef4444;border-radius:99px;transition:width 1s linear}
.answer-hint{font-size:13px;color:#888;text-align:center;min-height:20px;margin-bottom:8px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.pop{animation:pop .25s}
.result-emoji{font-size:56px;text-align:center;margin-bottom:8px}
.result-score{font-size:38px;font-weight:900;text-align:center;color:#5a2d91;margin-bottom:4px}
.result-msg{font-size:16px;text-align:center;color:#888;margin-bottom:6px}
.result-clear{font-size:22px;font-weight:900;text-align:center;margin-bottom:14px}
.result-clear.ok{color:#10b981}
.result-clear.ng{color:#ef4444}
.result-list{max-height:200px;overflow-y:auto;margin-bottom:16px;border:1px solid #f0e8ff;border-radius:12px;padding:8px}
.result-item{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 4px;border-bottom:1px solid #f9f5ff}
.result-item:last-child{border-bottom:none}
.result-item .q{color:#555;flex:1}
.result-item .a-correct{color:#10b981;font-weight:700;flex:1;text-align:right}
.result-item .a-wrong{color:#ef4444;font-weight:700;flex:1;text-align:right}
.btn-retry{width:100%;padding:13px;background:linear-gradient(90deg,#7c3aed,#a78bfa);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:900;cursor:pointer;margin-bottom:8px}
.btn-back{width:100%;padding:11px;background:#f0edff;color:#7c3aed;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer}
.tape-wrap{display:flex;gap:6px;flex-wrap:wrap;min-height:36px;margin-bottom:8px;padding:6px;background:#f3f0ff;border-radius:10px;border:1.5px dashed #c4b5fd;align-items:center}
.tape-char{padding:3px 8px;background:#7c3aed;color:#fff;border-radius:8px;font-size:16px;font-weight:900;cursor:pointer;transition:background .1s}
.tape-char:hover{background:#ef4444}
.mode-badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;background:#ede9fe;color:#7c3aed;margin-bottom:8px}
</style>
</head>
<body>

<div id="screen-menu" class="screen active card">
  <h1>えいごラーニング</h1>
  <p class="subtitle">英語をおぼえよう！</p>
  <div class="section-label">もんだいのしゅるい</div>
  <div class="btn-row" id="type-btns">
    <div class="btn selected" data-val="upper">大文字</div>
    <div class="btn" data-val="lower">小文字</div>
    <div class="btn" data-val="meaning">たんご</div>
  </div>
  <div class="section-label">モード</div>
  <div class="btn-row" id="mode-btns">
    <div class="btn selected" data-val="work">ワーク</div>
    <div class="btn" data-val="soft">ソフト</div>
    <div class="btn" data-val="hard">ハード</div>
  </div>
  <div class="mode-desc" id="mode-desc">📖 ワーク：アルファベット順・時間制限なし</div>
  <div class="section-label">こたえかた</div>
  <div class="btn-row" id="input-btns">
    <div class="btn selected" data-val="tap">タップ</div>
    <div class="btn" data-val="type">入力</div>
  </div>
  <div class="word-count" id="word-count"></div>
  <button class="btn-start" id="btn-start">スタート ▶</button>
</div>

<div id="screen-game" class="screen card">
  <div class="score-bar">
    <span>⭐ <span id="cur-score">0</span>てん</span>
    <span id="q-counter">1 / 26</span>
    <span class="timer" id="timer-disp"></span>
  </div>
  <div class="timer-bar-wrap" id="timer-bar-wrap" style="display:none">
    <div class="timer-bar" id="timer-bar" style="width:100%"></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="mode-badge" id="mode-badge">ワーク</div>
  <div class="question-type" id="q-type-label"></div>
  <div class="question-text" id="q-text"></div>
  <div class="answer-hint" id="answer-hint"></div>
  <div id="tap-area" style="display:none">
    <div class="tape-wrap" id="tape-wrap"></div>
    <div class="grid3x3" id="grid3x3"></div>
  </div>
  <div id="type-area" style="display:none">
    <div class="input-area">
      <input type="text" id="type-input" placeholder="こたえを入力…" autocomplete="off" autocapitalize="off" spellcheck="false"/>
      <button id="btn-submit">✓</button>
    </div>
  </div>
  <div class="feedback" id="feedback"></div>
</div>

<div id="screen-result" class="screen card">
  <div class="result-emoji" id="result-emoji">🎉</div>
  <div class="result-score" id="result-score">0てん</div>
  <div class="result-clear" id="result-clear"></div>
  <div class="result-msg" id="result-msg"></div>
  <div class="result-list" id="result-list"></div>
  <button class="btn-retry" id="btn-retry">もういちど ↺</button>
  <button class="btn-back" id="btn-back">メニューへ ←</button>
</div>

<script>
const ALPHABET='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const WORD_LIST=[
  {en:'lesson',ja:'授業'},{en:'book',ja:'本'},{en:'move',ja:'動く'},
  {en:'motor',ja:'原動機'},{en:'sensor',ja:'感知器'},{en:'rotations',ja:'回転数'},
  {en:'degrees',ja:'角度'},{en:'seconds',ja:'秒数'},{en:'time',ja:'時間'},
  {en:'start',ja:'開始'},{en:'stop',ja:'停止'},{en:'set',ja:'設定'},
  {en:'wait',ja:'待つ'},{en:'if',ja:'もし'},{en:'repeat',ja:'繰り返す'},
  {en:'count',ja:'数える'},{en:'touch',ja:'触れる'},{en:'line',ja:'線'},
  {en:'trace',ja:'跡'},{en:'up',ja:'上がる'},{en:'down',ja:'下がる'},
  {en:'forward',ja:'前方'},{en:'backward',ja:'後方'},{en:'right',ja:'右'},
  {en:'left',ja:'左'},{en:'center',ja:'中央'},{en:'import',ja:'取り込む'},
  {en:'pair',ja:'一対'},{en:'color',ja:'色'},{en:'red',ja:'赤'},
  {en:'green',ja:'緑'},{en:'blue',ja:'青'},{en:'yellow',ja:'黄色'},
  {en:'black',ja:'黒'},{en:'white',ja:'白'},{en:'print',ja:'印刷'},
  {en:'write',ja:'書く'},{en:'sound',ja:'音'},{en:'True',ja:'真'},
  {en:'False',ja:'偽'},{en:'pass',ja:'過ぎ去る'}
];
const MODE_DESCS={
  work:'📖 ワーク：アルファベット順・時間制限なし・全問',
  soft:'🌟 ソフト：ランダム10問・1問1.8秒・全問正解でクリア',
  hard:'🔥 ハード：ランダム10問・1問1.2秒・全問正解でクリア'
};
const TIMER_SECS={work:0,soft:18,hard:12};

let cfg={type:'upper',mode:'work',input:'tap'};
let questions=[],qIdx=0,score=0,results=[];
let timerInterval=null,timeLeft=0,maxTime=0;
let tapSelected=[];

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function updateWordCount(){
  document.getElementById('word-count').textContent=
    cfg.type==='meaning'?`たんご数: ${WORD_LIST.length}語`:`アルファベット: ${ALPHABET.length}文字`;
}
function updateModeDesc(){
  document.getElementById('mode-desc').textContent=MODE_DESCS[cfg.mode];
}
function setupBtns(groupId,key){
  document.querySelectorAll(`#${groupId} .btn`).forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll(`#${groupId} .btn`).forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected');cfg[key]=b.dataset.val;
      updateWordCount();updateModeDesc();
    });
  });
}
setupBtns('type-btns','type');setupBtns('mode-btns','mode');setupBtns('input-btns','input');
updateWordCount();updateModeDesc();

document.getElementById('btn-start').addEventListener('click',startGame);
document.getElementById('btn-submit').addEventListener('click',submitType);
document.getElementById('btn-retry').addEventListener('click',startGame);
document.getElementById('btn-back').addEventListener('click',()=>showScreen('screen-menu'));
document.getElementById('type-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitType();});

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function buildQuestions(){
  let pool;
  if(cfg.type==='upper'){
    pool=ALPHABET.map(l=>({display:l,answer:l.toLowerCase(),type:'upper'}));
  }else if(cfg.type==='lower'){
    pool=ALPHABET.map(l=>({display:l,answer:l.toLowerCase(),type:'lower'}));
  }else{
    pool=WORD_LIST.map(w=>({display:w.ja,answer:w.en,type:'meaning'}));
  }
  if(cfg.mode==='work')return pool;
  return shuffle(pool).slice(0,10);
}

function startGame(){
  questions=buildQuestions();qIdx=0;score=0;results=[];
  clearInterval(timerInterval);
  showScreen('screen-game');
  document.getElementById('mode-badge').textContent={work:'ワーク',soft:'ソフト',hard:'ハード'}[cfg.mode];
  showQuestion();
}

function showQuestion(){
  const q=questions[qIdx];
  const total=questions.length;
  document.getElementById('q-counter').textContent=`${qIdx+1} / ${total}`;
  document.getElementById('progress-fill').style.width=`${(qIdx/total)*100}%`;
  document.getElementById('cur-score').textContent=score;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('answer-hint').textContent='';
  tapSelected=[];

  const typeLabels={
    upper:cfg.input==='tap'?'大文字が表示 → 小文字をえらぼう':'このアルファベットを入力しよう',
    lower:cfg.input==='tap'?'大文字が表示 → 小文字をえらぼう':'このアルファベットを入力しよう',
    meaning:'意味から英単語を答えよう'
  };
  document.getElementById('q-type-label').textContent=typeLabels[q.type]||'';
  document.getElementById('q-text').textContent=q.display;

  if(cfg.input==='tap'){
    document.getElementById('tap-area').style.display='';
    document.getElementById('type-area').style.display='none';
    buildGrid(q);
  }else{
    document.getElementById('tap-area').style.display='none';
    document.getElementById('type-area').style.display='';
    document.getElementById('type-input').value='';
    setTimeout(()=>document.getElementById('type-input').focus(),100);
  }

  clearInterval(timerInterval);
  maxTime=TIMER_SECS[cfg.mode];
  const timerDisp=document.getElementById('timer-disp');
  const timerBarWrap=document.getElementById('timer-bar-wrap');
  const timerBar=document.getElementById('timer-bar');
  if(maxTime>0){
    timeLeft=maxTime;
    timerDisp.textContent=timeLeft+'秒';timerDisp.classList.remove('warn');
    timerBarWrap.style.display='';
    timerBar.style.transition='none';timerBar.style.width='100%';
    setTimeout(()=>{timerBar.style.transition=`width ${maxTime}s linear`;timerBar.style.width='0%';},50);
    startTimer();
  }else{
    timerDisp.textContent='';timerBarWrap.style.display='none';
  }
}

function startTimer(){
  const timerDisp=document.getElementById('timer-disp');
  timerInterval=setInterval(()=>{
    timeLeft--;
    timerDisp.textContent=timeLeft+'秒';
    if(timeLeft<=4)timerDisp.classList.add('warn');
    if(timeLeft<=0){
      clearInterval(timerInterval);
      const q=questions[qIdx];
      results.push({q:q.display,correct:q.answer,user:'(時間切れ)',ok:false});
      showFeedback(false,q.answer);disableAllCells();
      setTimeout(nextQ,1400);
    }
  },1000);
}

function buildGrid(q){
  const grid=document.getElementById('grid3x3');
  const tape=document.getElementById('tape-wrap');
  grid.innerHTML='';tape.innerHTML='';

  if(q.type==='upper'||q.type==='lower'){
    const ans=q.answer;
    const pool=ALPHABET.map(l=>l.toLowerCase()).filter(l=>l!==ans);
    const choices=shuffle([...shuffle(pool).slice(0,8),ans]);
    choices.forEach(ch=>{
      const cell=document.createElement('div');
      cell.className='cell';cell.textContent=ch;cell.style.fontSize='32px';
      cell.addEventListener('click',()=>handleTapSingle(cell,ch,q,ans));
      grid.appendChild(cell);
    });
  }else{
    const ans=q.answer.toLowerCase();
    const letters=[...ans];
    const extra=shuffle('abcdefghijklmnopqrstuvwxyz'.split('').filter(l=>!letters.includes(l))).slice(0,Math.max(0,9-letters.length));
    const pool=shuffle([...letters,...extra]).slice(0,9);
    pool.forEach(ch=>{
      const cell=document.createElement('div');
      cell.className='cell';cell.textContent=ch;cell.style.fontSize='28px';
      cell.addEventListener('click',()=>handleTapWord(cell,ch,q));
      grid.appendChild(cell);
    });
  }
}

function disableAllCells(){document.querySelectorAll('.cell').forEach(c=>c.classList.add('disabled'));}

function handleTapSingle(cell,chosen,q,correctVal){
  if(cell.classList.contains('disabled'))return;
  disableAllCells();clearInterval(timerInterval);
  const ok=chosen===correctVal;
  if(ok){
    cell.classList.add('correct','pop');score+=10;
    results.push({q:q.display,correct:correctVal,user:chosen,ok:true});
    showFeedback(true);setTimeout(nextQ,900);
  }else{
    cell.classList.add('wrong');
    document.querySelectorAll('.cell').forEach(c=>{if(c.textContent===correctVal)c.classList.add('correct');});
    results.push({q:q.display,correct:correctVal,user:chosen,ok:false});
    showFeedback(false,correctVal);setTimeout(nextQ,1400);
  }
}

function handleTapWord(cell,ch,q){
  if(cell.classList.contains('selected')||cell.classList.contains('disabled'))return;
  cell.classList.add('selected');
  tapSelected.push({ch,cell});
  const tape=document.getElementById('tape-wrap');
  const tc=document.createElement('div');tc.className='tape-char';tc.textContent=ch;
  const myIdx=tapSelected.length-1;
  tc.addEventListener('click',()=>{
    if(tapSelected[myIdx]){tapSelected[myIdx].cell.classList.remove('selected');tapSelected.splice(myIdx,1);tc.remove();}
    const cur=tapSelected.map(x=>x.ch).join('');
    document.getElementById('answer-hint').textContent=cur?`いまのこたえ: ${cur}`:'';
  });
  tape.appendChild(tc);
  const current=tapSelected.map(x=>x.ch).join('');
  document.getElementById('answer-hint').textContent=current?`いまのこたえ: ${current}`:'';
  if(current.length===q.answer.length){
    disableAllCells();clearInterval(timerInterval);
    const ok=current.toLowerCase()===q.answer.toLowerCase();
    results.push({q:q.display,correct:q.answer,user:current,ok});
    if(ok)score+=10;
    showFeedback(ok,q.answer);setTimeout(nextQ,ok?900:1400);
  }
}

function submitType(){
  const val=document.getElementById('type-input').value.trim();
  if(!val)return;
  const q=questions[qIdx];
  clearInterval(timerInterval);
  document.getElementById('type-area').style.display='none';
  const ok=val.toLowerCase()===q.answer.toLowerCase();
  results.push({q:q.display,correct:q.answer,user:val,ok});
  if(ok)score+=10;
  showFeedback(ok,q.answer);
  setTimeout(nextQ,ok?900:1400);
}

function showFeedback(ok,ans){
  const fb=document.getElementById('feedback');
  fb.textContent=ok?'⭕ せいかい！':`✖ ざんねん… こたえ: ${ans||''}`;
  fb.className='feedback '+(ok?'correct pop':'wrong');
}

function nextQ(){
  qIdx++;
  document.getElementById('cur-score').textContent=score;
  if(qIdx>=questions.length){showResult();return;}
  showQuestion();
}

function showResult(){
  showScreen('screen-result');
  const total=questions.length,correct=results.filter(r=>r.ok).length;
  const allCorrect=correct===total;
  const pct=Math.round(correct/total*100);
  const isChallenge=cfg.mode==='soft'||cfg.mode==='hard';
  let emoji,msg,clearText,clearClass;
  if(isChallenge){
    if(allCorrect){emoji='🏆';msg='ぜんもんせいかい！';clearText='🎊 クリア！おめでとう！';clearClass='ok';}
    else{emoji='😢';msg=`あと${total-correct}もん がんばろう！`;clearText=`✖ クリアならず… (${correct}/${total}もん正解)`;clearClass='ng';}
  }else{
    clearText='';clearClass='';
    if(pct>=90){emoji='🏆';msg='すごい！かんぺき！';}
    else if(pct>=70){emoji='🌟';msg='よくできました！';}
    else if(pct>=50){emoji='😊';msg='もうすこし！';}
    else{emoji='😢';msg='またがんばろう！';}
  }
  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('result-score').textContent=`${score}てん (${correct}/${total})`;
  document.getElementById('result-msg').textContent=msg;
  const clearEl=document.getElementById('result-clear');
  clearEl.textContent=clearText;clearEl.className='result-clear '+(clearClass||'');
  const list=document.getElementById('result-list');list.innerHTML='';
  results.forEach(r=>{
    const div=document.createElement('div');div.className='result-item';
    div.innerHTML=`<span class="q">${r.q}</span><span class="${r.ok?'a-correct':'a-wrong'}">${r.ok?'⭕':'✖ '+r.user+(r.ok?'':' → '+r.correct)}</span>`;
    list.appendChild(div);
  });
}
</script>
</body>
</html>
